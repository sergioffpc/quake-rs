[package]
name = "quake-server"
version = "0.1.0"
edition = "2024"

[dependencies]
quake-console = { path = "../crates/quake-console" }
quake-network = { path = "../crates/quake-network" }
quake-resources = { path = "../crates/quake-resources" }

anyhow.workspace = true
clap.workspace = true
tracing-subscriber.workspace = true

daemonize = "0.5.0"
tokio = { version = "1.48.0", features = ["rt-multi-thread", "time"] }
