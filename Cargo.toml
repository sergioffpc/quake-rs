[package]
name = "quake-rs"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0.91"
byteorder = "1.5.0"
glob = "0.3.1"
indexmap = "2.6.0"
legion = "0.4.0"
nom = "7.1.3"
num-derive = "0.4.2"
num-traits = "0.2.19"
rodio = "0.19.0"
tokio = { version = "1.41.0", features = ["full"] }
tracing = "0.1.40"
tracing-subscriber = { version = "0.3.18", features = ["env-filter"] }
wgpu = "22.1.0"
winit = "0.30.5"
